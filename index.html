<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/all/all.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="manage-logo">
                <img src="images/manageAI.png" alt="Manage AI">

            <p class="text">

            <!-- ปุ่มลงชื่อเข้าใช้งาน -->
            <a href="index2.html" class="btn login-btn">

            <a href="index2.html" class="btn register-btn">

            <div class="divider">
                <span>หรือ</span>
            </div>

            <!-- ปุ่ม ONE ID -->
            <a href="index2.html" class="btn oneid-btn">

        </div>
